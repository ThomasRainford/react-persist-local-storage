name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        react-version: ["18", "19"]

    name: Test with React ${{ matrix.react-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Override React version
        run: npm install react@${{ matrix.react-version }} react-dom@${{ matrix.react-version }} --no-save --legacy-peer-deps

      - name: Lint
        run: npm run lint:check

      - name: Format
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
